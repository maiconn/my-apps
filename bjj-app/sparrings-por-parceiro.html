<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BJJ - Sparrings por parceiro</title>
    <link rel="stylesheet" href="css/app.css" />
  </head>
  <body>
    <div id="app-loader" class="app-loader" hidden aria-hidden="true">
      <div class="app-loader-spinner"></div>
    </div>
    <main>
      <nav class="app-nav">
        <a href="index.html">Calendário</a>
        <span class="app-nav-sep">·</span>
        <a href="registrar-treino.html">Registro de treino</a>
        <span class="app-nav-sep">·</span>
        <a href="sparrings-por-parceiro.html">Sparrings por parceiro</a>
        <span class="app-nav-sep">·</span>

        <span class="app-nav-sep">·</span>
        <button type="button" class="btn btn-ghost btn-nav" id="btn-logout">Sair</button>
      </nav>

      <div class="auth-bar">
        <span id="auth-status" class="auth-email"></span>
      </div>

      <h1>Registro de sparrings por parceiro</h1>
      <p class="sub">Selecione um parceiro para visualizar totais e ações técnicas consolidadas.</p>
      <div id="feedback-sparring-parceiro" class="feedback" role="status"></div>

      <section aria-labelledby="titulo-parceiros">
        <h2 id="titulo-parceiros">Parceiros cadastrados</h2>
        <div class="partner-grid">
          <div id="parceiros-lista" class="partner-list"></div>
          <div id="parceiro-detalhes" class="partner-details">
            <p class="text-muted mt-0">Escolha um parceiro na lista.</p>
          </div>
        </div>
      </section>

    <script type="module" src="js/sparringsPorParceiro.js"></script>
