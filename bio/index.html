<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maicon Gerardi | Links Úteis</title>

    <style>
        :root {
            --bg: #062a48;
            --primary: #ff4b4b;
            --pill: #9aa3ac;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--white);
        }

        .card {
            width: 100%;
            max-width: 420px;
            padding: 40px 20px;
            text-align: center;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .avatar {
            width: 50%;
            height: 50%;
            border-radius: 50%;

            object-fit: cover;
            display: block;
            margin: 0 auto 16px;

            /* FORÇA RENDER EM ALTA QUALIDADE */
            transform: translate3d(0, 0, 0);
            backface-visibility: hidden;
            will-change: transform;
        }


        /* NOME */
        .name {
            font-size: 26px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 12px;
        }

        /* REDES */
        .social {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-bottom: 26px;
        }

        .social a {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: transform .2s ease, box-shadow .2s ease;
        }

        .social a:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 10px 25px rgba(0, 0, 0, .25);
        }

        .social a:active {
            transform: scale(0.95);
        }

        .linkedin {
            background: #0a66c2;
        }

        .instagram {
            background: #111111;
        }

        .youtube {
            background: #ff0000;
        }

        .social svg {
            width: 22px;
            height: 22px;
            fill: white;
        }

        /* TEXTO */
        .subtitle {
            margin-top: 30px;
            font-size: 15px;
            opacity: 0.9;
        }

        /* CTA */
        .cta {
            margin-top: 18px;
        }

        .cta a {
            display: block;
            background: var(--pill);
            border-radius: 999px;
            padding: 26px 20px;
            text-decoration: none;
            transition: transform .25s ease, box-shadow .25s ease;
        }

        .cta a:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, .35);
        }

        .cta a:active {
            transform: scale(0.97);
        }

        .cta span {
            font-size: 44px;
            font-weight: 900;
            letter-spacing: 1px;
            color: #e32626;
            display: block;
        }

        @media (max-width: 420px) {
            .cta span {
                font-size: 36px;
            }
        }
    </style>
</head>

<body>

    <div class="card">

        <img src="profile.png" alt="Foto de perfil" class="avatar">

        <!-- NOME -->
        <div class="name">Maicon Gerardi</div>

        <!-- REDES SOCIAIS -->
        <div class="social">

            <!-- LinkedIn -->
            <a href="https://www.linkedin.com/in/maicongerardi/" class="linkedin" target="_blank" aria-label="LinkedIn">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M4.98 3.5A2.5 2.5 0 1 1 5 8.5a2.5 2.5 0 0 1-.02-5zM3 9h4v12H3zM9 9h4v1.7h.06c.56-1.06 1.94-2.2 3.99-2.2 4.27 0 5.05 2.8 5.05 6.43V21h-4v-5.7c0-1.36-.02-3.1-1.89-3.1-1.9 0-2.19 1.48-2.19 3v5.8H9z" />
                </svg>
            </a>

            <!-- Instagram -->
            <a href="https://www.instagram.com/maicongerardi" class="instagram" target="_blank" aria-label="Instagram">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5zm5 5.5A4.5 4.5 0 1 0 12 16.5a4.5 4.5 0 0 0 0-9zm6.25-.75a1.25 1.25 0 1 1-1.25-1.25 1.25 1.25 0 0 1 1.25 1.25z" />
                </svg>
            </a>

            <!-- YouTube -->
            <a href="https://www.youtube.com/channel/UCiZ53KA9XUBYwLn4JZERgQQ?sub_confirmation=1" class="youtube"
                target="_blank" aria-label="YouTube">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M23.5 6.19a2.98 2.98 0 0 0-2.1-2.1C19.54 3.5 12 3.5 12 3.5s-7.54 0-9.4.59A2.98 2.98 0 0 0 .5 6.19 31.1 31.1 0 0 0 0 12a31.1 31.1 0 0 0 .5 5.81 2.98 2.98 0 0 0 2.1 2.1c1.86.59 9.4.59 9.4.59s7.54 0 9.4-.59a2.98 2.98 0 0 0 2.1-2.1A31.1 31.1 0 0 0 24 12a31.1 31.1 0 0 0-.5-5.81zM9.75 15.02V8.98L15.5 12z" />
                </svg>
            </a>

        </div>

        <!-- TEXTO -->
        <div class="subtitle">Curso recomendado:</div>

        <!-- CTA JORNADA FLIX -->
        <div class="cta">
            <a href="https://jornadati.com.br/jornadaflix/" target="_blank">
                <span>JORNADA FLIX</span>
            </a>
        </div>

    </div>

</body>

</html>
